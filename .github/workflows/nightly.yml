name: Nightly Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

env:
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64 .deb (native)
  # ---------------------------------------------------------------------------
  linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper devscripts fakeroot lintian \
            build-essential cmake pkg-config ninja-build meson git \
            spirv-cross glslang-tools libglfw3-dev \
            mesa-vulkan-drivers libvulkan-dev vulkan-validationlayers \
            libsoapysdr-dev soapysdr-module-rtlsdr \
            libgstreamer1.0-dev gstreamer1.0-libav \
            gstreamer1.0-plugins-base libgstreamer-plugins-bad1.0-dev \
            libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            python3-yaml python3-numpy python3-pip
          sudo pip3 install --break-system-packages numpy mapbox_earcut

      - name: Update changelog with nightly version
        run: |
          NIGHTLY_VERSION="1.0.0+nightly$(date +%Y%m%d)+git$(git rev-parse --short HEAD)"
          sed -i "1s/(.*)/(${NIGHTLY_VERSION})/" debian/changelog

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p output
          mv ../*.deb output/
          cd output
          for f in *.deb; do
            mv "$f" "${f%.deb}-amd64.deb"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-linux-x86_64
          path: output/*.deb

  # ---------------------------------------------------------------------------
  # Linux ARM64 .deb (native)
  # ---------------------------------------------------------------------------
  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper devscripts fakeroot lintian \
            build-essential cmake pkg-config ninja-build meson git \
            spirv-cross glslang-tools libglfw3-dev \
            mesa-vulkan-drivers libvulkan-dev vulkan-validationlayers \
            libsoapysdr-dev \
            libgstreamer1.0-dev gstreamer1.0-libav \
            gstreamer1.0-plugins-base libgstreamer-plugins-bad1.0-dev \
            libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            python3-yaml python3-numpy python3-pip
          sudo pip3 install --break-system-packages numpy mapbox_earcut

      - name: Update changelog with nightly version
        run: |
          NIGHTLY_VERSION="1.0.0+nightly$(date +%Y%m%d)+git$(git rev-parse --short HEAD)"
          sed -i "1s/(.*)/(${NIGHTLY_VERSION})/" debian/changelog

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p output
          mv ../*.deb output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-linux-arm64
          path: output/*.deb

  # ---------------------------------------------------------------------------
  # Linux RISC-V 64 .deb (QEMU container)
  # ---------------------------------------------------------------------------
  linux-riscv64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Build .deb in riscv64 container
        uses: addnab/docker-run-action@v3
        with:
          image: riscv64/ubuntu:24.04
          options: --platform linux/riscv64 -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            apt-get update
            apt-get install -y \
              debhelper devscripts fakeroot lintian \
              build-essential cmake pkg-config ninja-build meson git \
              spirv-cross glslang-tools libglfw3-dev \
              mesa-vulkan-drivers libvulkan-dev \
              libsoapysdr-dev \
              libgstreamer1.0-dev gstreamer1.0-libav \
              gstreamer1.0-plugins-base libgstreamer-plugins-bad1.0-dev \
              libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev \
              gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
              python3-yaml python3-numpy python3-pip
            pip3 install --break-system-packages numpy mapbox_earcut

            NIGHTLY_VERSION="1.0.0+nightly$(date +%Y%m%d)+git$(git rev-parse --short HEAD)"
            sed -i "1s/(.*)/(${NIGHTLY_VERSION})/" debian/changelog

            dpkg-buildpackage -us -uc -b

            mkdir -p /workspace/output
            mv ../*.deb /workspace/output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-linux-riscv64
          path: output/*.deb

  # ---------------------------------------------------------------------------
  # Create nightly release
  # ---------------------------------------------------------------------------
  release:
    needs: [linux-x86_64, linux-arm64, linux-riscv64]
    if: ${{ always() && contains(needs.*.result, 'success') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect and checksum
        run: |
          mkdir -p release
          find artifacts -name "*.deb" -exec mv {} release/ \;
          cd release
          sha256sum *.deb > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Delete previous nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --repo ${{ github.repository }} --yes 2>/dev/null || true
          git push --delete origin nightly 2>/dev/null || true
        continue-on-error: true

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ github.run_number }})"
          prerelease: true
          body: |
            Automated nightly build from `${{ github.ref_name }}` branch.

            **Commit:** ${{ github.sha }}
            **Build type:** ${{ env.BUILD_TYPE }}
            **Base:** Ubuntu 24.04 (Noble Numbat)
            **Triggered by:** ${{ github.actor }}

            ## Install

            ```bash
            # Download the .deb for your architecture and install:
            sudo apt install ./cyberether_*.deb
            ```

            ## Downloads

            | Architecture | File |
            |-------------|------|
            | amd64 | `cyberether_*_amd64.deb` |
            | arm64 | `cyberether_*_arm64.deb` |
            | riscv64 | `cyberether_*_riscv64.deb` |

            ## Checksums
            See `SHA256SUMS.txt` or expand below:
            ```
            $(cat release/SHA256SUMS.txt)
            ```
          files: |
            release/*.deb
            release/SHA256SUMS.txt
